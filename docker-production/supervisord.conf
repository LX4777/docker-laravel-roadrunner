[supervisord]
nodaemon=true
user=root
pidfile=/var/run/supervisord.pid

[program:php]
command=php -d variables_order=EGPCS /var/www/html/artisan octane:start --rpc-port=6001 --host=0.0.0.0 --port=8000
user=sail
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autostart=true
autorestart=true

[program:ssr]
command=php -d variables_order=EGPCS /var/www/html/artisan inertia:start-ssr
user=sail
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
